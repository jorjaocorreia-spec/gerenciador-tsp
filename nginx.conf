server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security Headers — definidos no server block e repetidos nos location blocks
    # que têm seu próprio add_header (para evitar quebra de herança do nginx)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com https://apis.google.com https://accounts.google.com https://cdn.jsdelivr.net; worker-src blob: https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://www.googleapis.com https://content.googleapis.com https://oauth2.googleapis.com https://securetoken.googleapis.com https://accounts.google.com; img-src 'self' data: blob:; frame-src https://accounts.google.com https://content.googleapis.com; frame-ancestors 'none';" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block access to sensitive files
    location ~* \.(env|sh|py|bat|md|conf|gitignore)$ {
        deny all;
        return 404;
    }

    # Block skills directory
    location /skills {
        deny all;
        return 404;
    }

    # JS e CSS: nunca cachear com max-age — browser sempre revalida com o servidor.
    # Isso garante que após um deploy o F5 busque o código atualizado.
    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com https://apis.google.com https://accounts.google.com https://cdn.jsdelivr.net; worker-src blob: https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://www.googleapis.com https://content.googleapis.com https://oauth2.googleapis.com https://securetoken.googleapis.com https://accounts.google.com; img-src 'self' data: blob:; frame-src https://accounts.google.com https://content.googleapis.com; frame-ancestors 'none';" always;
    }

    # HTML: mesma regra do bloco CSS/JS acima — sem isso, o index.html podia
    # ficar em cache heurístico do navegador enquanto JS/CSS já estavam
    # atualizados, causando desalinhamento (JS novo chamando elementos que
    # só existiam no HTML de um deploy mais recente, gerando erro de null).
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com https://apis.google.com https://accounts.google.com https://cdn.jsdelivr.net; worker-src blob: https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://www.googleapis.com https://content.googleapis.com https://oauth2.googleapis.com https://securetoken.googleapis.com https://accounts.google.com; img-src 'self' data: blob:; frame-src https://accounts.google.com https://content.googleapis.com; frame-ancestors 'none';" always;
    }

    # Imagens e fontes: cache longo (raramente mudam)
    location ~* \.(png|jpg|jpeg|gif|ico|woff|woff2)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com https://apis.google.com https://accounts.google.com https://cdn.jsdelivr.net; worker-src blob: https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://www.googleapis.com https://content.googleapis.com https://oauth2.googleapis.com https://securetoken.googleapis.com https://accounts.google.com; img-src 'self' data: blob:; frame-src https://accounts.google.com https://content.googleapis.com; frame-ancestors 'none';" always;
    }
}
