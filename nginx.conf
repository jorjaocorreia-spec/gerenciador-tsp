server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com https://apis.google.com https://accounts.google.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://www.googleapis.com https://securetoken.googleapis.com; img-src 'self' data: blob:; frame-ancestors 'none';" always;

    # Rate limiting zone (basic brute-force protection)
    # Note: limit_req_zone must be in http context; defined here for reference only
    # See Dockerfile for full nginx config injection

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block access to sensitive files
    location ~* \.(env|sh|py|bat|md|json|gitignore)$ {
        deny all;
        return 404;
    }

    # Block skills directory
    location /skills {
        deny all;
        return 404;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|woff|woff2)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
}
